<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <script>
    (function () {
      const BASE_URL = "https://okizeme.gg/database";

      const CHARACTERS = [
        { slug: "alisa", aliases: ["alisa", "alisa bosconovitch"] },
        { slug: "anna", aliases: ["anna", "anna williams"] },
        { slug: "armor-king", aliases: ["armor king", "armour king", "ak"] },
        { slug: "asuka", aliases: ["asuka", "asuka kazama"] },
        { slug: "azucena", aliases: ["azucena", "azucena milagros ortiz castillo"] },
        { slug: "bryan", aliases: ["bryan", "bryan fury"] },
        { slug: "claudio", aliases: ["claudio", "claudio serafino"] },
        { slug: "clive", aliases: ["clive", "clive rosfield"] },
        { slug: "devil-jin", aliases: ["devil jin", "dj"] },
        { slug: "dragunov", aliases: ["dragunov", "sergei dragunov"] },
        { slug: "eddy", aliases: ["eddy", "eddy gordo"] },
        { slug: "fahkumram", aliases: ["fahkumram", "fahk"] },
        { slug: "feng", aliases: ["feng", "feng wei"] },
        { slug: "heihachi", aliases: ["heihachi", "heihachi mishima"] },
        { slug: "hwoarang", aliases: ["hwoarang", "hwaorang", "hwo"] },
        { slug: "jack-8", aliases: ["jack-8", "jack 8", "jack8", "jack"] },
        { slug: "jin", aliases: ["jin", "jin kazama"] },
        { slug: "jun", aliases: ["jun", "jun kazama"] },
        { slug: "kazuya", aliases: ["kazuya", "kazuya mishima", "kaz"] },
        { slug: "king", aliases: ["king"] },
        { slug: "kuma", aliases: ["kuma", "kuma ii"] },
        { slug: "kunimitsu", aliases: ["kunimitsu", "kunimitsu ii", "kuni"] },
        { slug: "lars", aliases: ["lars", "lars alexandersson"] },
        { slug: "law", aliases: ["law", "marshall law", "marshal law"] },
        { slug: "lee", aliases: ["lee", "lee chaolan"] },
        { slug: "leo", aliases: ["leo", "leo kliesen"] },
        { slug: "leroy", aliases: ["leroy", "leroy smith"] },
        { slug: "lidia", aliases: ["lidia", "lidia sobieska"] },
        { slug: "lili", aliases: ["lili", "emilie de rochefort", "lili de rochefort"] },
        { slug: "miary-zo", aliases: ["miary zo", "miary", "nomenjanahary miary zo andrianavalona"] },
        { slug: "nina", aliases: ["nina", "nina williams"] },
        { slug: "panda", aliases: ["panda"] },
        { slug: "paul", aliases: ["paul", "paul phoenix"] },
        { slug: "raven", aliases: ["raven"] },
        { slug: "reina", aliases: ["reina"] },
        { slug: "shaheen", aliases: ["shaheen"] },
        { slug: "steve", aliases: ["steve", "steve fox"] },
        { slug: "victor", aliases: ["victor", "victor chevalier"] },
        { slug: "xiaoyu", aliases: ["xiaoyu", "ling xiaoyu", "ling"] },
        { slug: "yoshimitsu", aliases: ["yoshimitsu", "yoshi"] },
        { slug: "zafina", aliases: ["zafina"] },

        // Tekken 8 Season 3 DLC announced/reported after Okizeme's current list.
        { slug: "bob", aliases: ["bob", "bob richards", "robert richards"] },
        { slug: "roger-jr", aliases: ["roger jr", "roger jr.", "roger junior", "roger"] },
        { slug: "yujiro-hanma", aliases: ["yujiro hanma", "yujiro", "baki"] }
      ];

      function normalize(value) {
        return value
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[.'’]/g, "")
          .replace(/[-_]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function isDirectFlag(value) {
        return ["direct", "d", "-d", "--direct"].includes(value.toLowerCase());
      }

      function formatDirectMove(move) {
        const commandPrefixes = [
          "qcf", "qcb", "hcf", "hcb",
          "df", "db", "uf", "ub",
          "ws", "wr", "ss", "fc", "bt",
          "f", "b", "u", "d", "n"
        ];
        const prefixPattern = commandPrefixes.join("|");

        return move
          .trim()
          .replace(/\s+/g, " ")
          .replace(
            new RegExp("\\b(" + prefixPattern + ")\\s+([1-4])", "gi"),
            function (_, prefix, button) {
              return prefix.toLowerCase() + "+" + button;
            }
          )
          .replace(/\b([A-Za-z]{2,})\s+([1-4](?:\+[1-4])*)\b/g, "$1.$2")
          .split(" ")
          .map(function (token) {
            let value = token.replace(
              /^(d|u)\/(f|b)(\+?)([1-4])/i,
              function (_, vertical, horizontal, plus, button) {
                return vertical.toLowerCase() + horizontal.toLowerCase() + "+" + button;
              }
            );

            value = value.replace(
              new RegExp("^(" + prefixPattern + ")([1-4])", "i"),
              function (_, prefix, button) {
                return prefix.toLowerCase() + "+" + button;
              }
            );

            value = value.replace(/^([A-Za-z]{2,})\.?([1-4])/, function (match, stance, button) {
              if (commandPrefixes.includes(stance.toLowerCase())) return match;
              return stance.toUpperCase() + "." + button;
            });

            return value;
          })
          .join(" ");
      }

      function findCharacter(raw) {
        const normalizedRaw = normalize(raw);
        const matches = [];

        for (const character of CHARACTERS) {
          for (const alias of character.aliases) {
            const normalizedAlias = normalize(alias);
            if (
              normalizedRaw === normalizedAlias ||
              normalizedRaw.startsWith(normalizedAlias + " ")
            ) {
              matches.push({
                slug: character.slug,
                alias: normalizedAlias,
                length: normalizedAlias.length
              });
            }
          }
        }

        if (matches.length === 0) return null;

        matches.sort((a, b) => b.length - a.length);
        const best = matches[0];
        const tokens = raw.trim().split(/\s+/);
        let consumed = 0;

        for (let i = 1; i <= tokens.length; i++) {
          if (normalize(tokens.slice(0, i).join(" ")) === best.alias) {
            consumed = i;
            break;
          }
        }

        return {
          slug: best.slug,
          move: tokens.slice(consumed).join(" ").trim()
        };
      }

      const params = new URLSearchParams(window.location.search);
      const raw = (params.get("q") || "").trim();

      if (!raw) {
        window.location.replace(BASE_URL);
        return;
      }

      const parts = raw.split(/\s+/);
      const isDirectMode = isDirectFlag(parts[parts.length - 1]);
      const query = isDirectMode ? parts.slice(0, -1).join(" ").trim() : raw;
      const match = findCharacter(query);

      if (!match) {
        const fallbackParts = query.split(/\s+/);
        const character = (fallbackParts.shift() || "").trim();

        if (!character) {
          window.location.replace(BASE_URL);
          return;
        }

        const move = fallbackParts.join(" ").trim();
        if (!move) {
          window.location.replace(BASE_URL + "/" + encodeURIComponent(character));
          return;
        }

        const directMove = formatDirectMove(move);
        const fallbackUrl = isDirectMode
          ? BASE_URL + "/" + encodeURIComponent(character) + "/" + encodeURIComponent(directMove)
          : BASE_URL + "/" + encodeURIComponent(character) + "?search=" + encodeURIComponent(move);

        window.location.replace(fallbackUrl);
        return;
      }

      if (!match.move) {
        window.location.replace(BASE_URL + "/" + encodeURIComponent(match.slug));
        return;
      }

      const directMove = formatDirectMove(match.move);
      const url = isDirectMode
        ? BASE_URL + "/" + encodeURIComponent(match.slug) + "/" + encodeURIComponent(directMove)
        : BASE_URL + "/" + encodeURIComponent(match.slug) + "?search=" + encodeURIComponent(match.move);

      window.location.replace(url);
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
